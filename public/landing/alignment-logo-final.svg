<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Alignment AI logo</title>
  <desc id="desc">White and orange overlapping AA mark with Alignment AI wordmark on a black field.</desc>
  <defs>
    <linearGradient id="whiteMark" x1="190" y1="90" x2="610" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f8f8f6"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="orangeMark" x1="555" y1="80" x2="825" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8a35"/>
      <stop offset="0.5" stop-color="#ff6f23"/>
      <stop offset="1" stop-color="#ef5a22"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="960" height="720" fill="#050607"/>

  <g filter="url(#softShadow)">
    <path
      fill="url(#orangeMark)"
      fill-rule="evenodd"
      d="M568 64h68l216 496h-88l-58-136H589l28-66h61l-79-188-63 149-43-96L568 64Zm71 0 216 496h-8L631 64h8Z"
    />

    <path
      fill="url(#whiteMark)"
      fill-rule="evenodd"
      d="M367 64h66l210 496h-88l-48-116H336l-46 116H170L367 64Zm33 103-79 191h157L400 167Z"
    />

    <path
      fill="url(#whiteMark)"
      d="M439 318h54l136 242h-82l-62-119-58 119h-82l94-242Z"
    />

    <path
      fill="#050607"
      d="M353 358h126l-36 66H326l27-66Z"
    />
  </g>

  <g font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="94" letter-spacing="-4">
    <text x="112" y="676" fill="#f7f7f4">Alignment</text>
    <text x="760" y="676" fill="#ff6f23">AI</text>
  </g>
</svg>
